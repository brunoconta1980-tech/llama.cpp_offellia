<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filtro de brilho neon externo -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="blur3"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="36" result="blur4"/>
      <feMerge>
        <feMergeNode in="blur4"/>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Filtro de brilho interno (núcleo) -->
    <filter id="coreGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Camada de brilho externo roxo -->
  <path d="M130 440 L200 440 L200 385 C165 350, 140 295, 140 230 C140 145, 195 90, 256 90 C317 90, 372 145, 372 230 C372 295, 347 350, 312 385 L312 440 L382 440 L382 410 L340 410 L340 375 C380 335, 402 280, 402 230 C402 130, 340 60, 256 60 C172 60, 110 130, 110 230 C110 280, 132 335, 172 375 L172 410 L130 410 L130 440Z" fill="#7b00e0" filter="url(#neonGlow)" opacity="0.7"/>

  <!-- Corpo principal do Ω -->
  <path d="M130 440 L200 440 L200 385 C165 350, 140 295, 140 230 C140 145, 195 90, 256 90 C317 90, 372 145, 372 230 C372 295, 347 350, 312 385 L312 440 L382 440 L382 410 L340 410 L340 375 C380 335, 402 280, 402 230 C402 130, 340 60, 256 60 C172 60, 110 130, 110 230 C110 280, 132 335, 172 375 L172 410 L130 410 L130 440Z" fill="#b026ff"/>

  <!-- Borda interna brilhante (núcleo neon) -->
  <path d="M130 440 L200 440 L200 385 C165 350, 140 295, 140 230 C140 145, 195 90, 256 90 C317 90, 372 145, 372 230 C372 295, 347 350, 312 385 L312 440 L382 440 L382 410 L340 410 L340 375 C380 335, 402 280, 402 230 C402 130, 340 60, 256 60 C172 60, 110 130, 110 230 C110 280, 132 335, 172 375 L172 410 L130 410 L130 440Z" fill="none" stroke="#e8b0ff" stroke-width="2.5" filter="url(#coreGlow)"/>
</svg>